{{- $app := .Values.apps.api }}
{{- if and $app.enabled $app.jwtSecret.create }}
{{- $ctx := dict "appName" "api" "appValues" $app "root" $ }}
{{- $secretName := include "radinage.jwtSecretName" $ }}
{{- $secretKey := $app.jwtSecret.key }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "radinage.labels" $ctx | nindent 4 }}
    {{- with $app.jwtSecret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $app.jwtSecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if and $existing (hasKey $existing.data $secretKey) }}
  {{ $secretKey }}: {{ index $existing.data $secretKey }}
  {{- else }}
  {{ $secretKey }}: {{ randAlphaNum 64 | b64enc }}
  {{- end }}
{{- end }}
