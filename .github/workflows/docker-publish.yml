name: Docker Publish

on:
  push:
    tags: [v*]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leroyguillaume/radinage

permissions:
  contents: write
  packages: write

jobs:
  verify-version:
    name: Verify Cargo.toml matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check workspace version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          versions=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].version' | sort -u)
          if [ "$(echo "$versions" | wc -l)" -ne 1 ]; then
            echo "::error::workspace packages have mismatched versions:"
            echo "$versions"
            exit 1
          fi
          if [ "$versions" != "$tag_version" ]; then
            echo "::error::workspace version ($versions) does not match tag ($tag_version)"
            exit 1
          fi
          echo "workspace: $versions matches tag"

  build:
    name: Build ${{ matrix.target }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        target: [api, mcp, webapp]
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set platform slug
        run: echo "PLATFORM_SLUG=${PLATFORM#linux/}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=rust-${{ env.PLATFORM_SLUG }}
            type=gha,scope=webapp-${{ env.PLATFORM_SLUG }}
          outputs: type=image,"name=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.target }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        target: [api, mcp, webapp]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.target }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_PREFIX }}-${{ matrix.target }}@sha256:%s ' *)

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
