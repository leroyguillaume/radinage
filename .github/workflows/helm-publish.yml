name: Helm Publish

on:
  push:
    tags: [chart-*]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/leroyguillaume/charts

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Login to OCI registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push
        run: |
          VERSION="${GITHUB_REF_NAME#chart-}"
          yq -i ".version = \"$VERSION\"" helm/radinage/Chart.yaml
          helm package helm/radinage
          helm push "radinage-$VERSION.tgz" "oci://$REGISTRY"
